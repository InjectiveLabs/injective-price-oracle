env: mainnet
cluster_name: eu
oracle:
  web2-provider:
    main:
      name: "main"
      enabled: true
      version: "v1.2.15"
      env:
        chain:
          chainId: injective-1
          gasPrices: 1600000000inj
          gasAdjust: "1.6"
          serviceWaitTimeout: 1m
          networkOverride: "true"
          grpcEndpoint: "k8s.bm.mainnet.chain.grpc.injective.network:443,sentry.chain.grpc.injective.network:443"
          grpcStreamEndpoint: "k8s.bm.mainnet.chain.stream.injective.network:443,sentry.chain.stream.injective.network:443"
          tmEndpoint: "https://k8s.bm.mainnet.tm.injective.network,https://sentry.tm.injective.network:443"
        keyring:
          useLedger: "false"
        logLevel: info
        oracleEnv: prod
      replicaCount: 1
      secret:
        refreshInterval: 1h
        streams_override: 
        oracle_secrets_override: 
      feedConfigFiles:
      - name: RKLB_USDC.tpl
        content: |
          provider = "InjectiveLabs"
          ticker = "RKLB/USDC"
          pullInterval = "5s"
          oracleType = "Provider"
          observationSource = """
            feed [type=http
                    method=POST
                    url="https://fast-api.mainnet.seda.xyz/execute?encoding=json"
                    requestData="{\\"execProgramId\\":\\"0043ac6c9125f0faf5bac98cac2171a9929f6806750c6e4510e2e1e48b246264\\",\\"execInputs\\":{\\"dex\\":\\"xyz\\",\\"assetIndex\\":62,\\"coin\\":\\"xyz:RKLB\\"}}"
                    headerMap="{\\"Authorization\\": \\"Bearer $SEDA_API_KEY\\", \\"Content-Type\\": \\"application/json\\"}"];
            feedParse [type="jsonparse" path="data,result,price"]
            feed -> feedParse

            usdc [type=http method=GET url="https://k8s.mainnet.asset.injective.network/asset-price/v1/prices?denoms=erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"];
            usdcParse [type="jsonparse" path="erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"]
            usdc -> usdcParse

            RKLBUSDCPrice [type="divide" input="$(feedParse)" divisor="$(usdcParse)" precision=6]
            RKLBUSDCPrice
          """
      - name: SPCX_USDC.tpl
        content: |
          provider = "InjectiveLabs"
          ticker = "SPCX/USDC"
          pullInterval = "5s"
          oracleType = "Provider"
          observationSource = """
            feed [type=http
                    method=POST
                    url="https://fast-api.mainnet.seda.xyz/execute?encoding=json"
                    requestData="{\\"execProgramId\\":\\"0043ac6c9125f0faf5bac98cac2171a9929f6806750c6e4510e2e1e48b246264\\",\\"execInputs\\":{\\"dex\\":\\"xyz\\",\\"assetIndex\\":76,\\"coin\\":\\"xyz:SPCX\\",\\"network\\":\\"Mainnet\\"}}"
                    headerMap="{\\"Authorization\\": \\"Bearer $SEDA_API_KEY\\", \\"Content-Type\\": \\"application/json\\"}"];
            feedParse [type="jsonparse" path="data,result,price"]
            feed -> feedParse

            usdc [type=http method=GET url="https://k8s.mainnet.asset.injective.network/asset-price/v1/prices?denoms=erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"];
            usdcParse [type="jsonparse" path="erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"]
            usdc -> usdcParse

            SPCXUSDCPrice [type="divide" input="$(feedParse)" divisor="$(usdcParse)" precision=6]
            SPCXUSDCPrice
          """
      - name: TRADFI_USDC.tpl
        content: |
          provider = "InjectiveLabs"
          ticker = "TRADFI/USDC"
          pullInterval = "2s"
          oracleType = "Provider"
          observationSource = """
            feed [type=http
                    method=GET
                    url="https://fast-api.mainnet.seda.xyz/execute?execProgramId=911f50231841ade5fe000b3b08ffaf2f2a4999e41dd75739390c6b6306ce1f54&execInputs=%7B%22proxyConfig%22%3A%7B%22proxyUrl%22%3A%22http%3A%2F%2Fpyth-pro-injective.proxy.mainnet.seda.xyz%2Fproxy%2F%22%2C%22proxyPublicKey%22%3A%22024f821c036d8459434ed22c7a9eae30306c98287dc3c2c523819bde735b50a7f9%22%7D%2C%22idOrSymbol%22%3A%221398%22%2C%22isId%22%3Atrue%2C%22channel%22%3A%22FixedRate200ms%22%7D&includeDebugInfo=true&encoding=utf8&injectLastResult=success"
                    headerMap="{\\"Authorization\\": \\"Bearer $SEDA_API_KEY\\", \\"Content-Type\\": \\"application/json\\"}"];
            feedParse1 [type="jsonparse" path="data,result"]
            feedParse2 [type="jsonparse" path="price"]
            feed -> feedParse1 -> feedParse2

            usdc [type=http method=GET url="https://k8s.mainnet.asset.injective.network/asset-price/v1/prices?denoms=erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"];
            usdcParse [type="jsonparse" path="erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"]
            usdc -> usdcParse

            TRADFIUSDCPrice [type="divide" input="$(feedParse2)" divisor="$(usdcParse)" precision=6]
            TRADFIUSDCPrice
          """
      - name: TRIA_USDC.tpl
        content: |
          provider = "InjectiveLabs"
          ticker = "TRIA/USDC"
          pullInterval = "5s"
          oracleType = "Provider"
          observationSource = """
            feed [type=http
                    method=POST
                    url="https://fast-api.mainnet.seda.xyz/execute?encoding=json"
                    requestData="{\\"execProgramId\\":\\"746d66496fd39ef4ab628adf61b5cf705137219270fe2881555b1805ac136a27\\",\\"execInputs\\":{\\"proxyConfig\\":{\\"proxyUrl\\":\\"http://multi.proxy.mainnet.seda.xyz/proxy\\",\\"proxyPublicKey\\":\\"03ca83cf013a472640b85442431707022147693c1afe77303149957d632727819f\\"},\\"exchanges\\":[\\"binanceFutures\\"],\\"path\\":\\"multi/TRIA/0/TRIA\\",\\"minSources\\":1},\\"inputEncoding\\":\\"auto\\"}"
                    headerMap="{\\"Authorization\\": \\"Bearer $SEDA_API_KEY\\", \\"Content-Type\\": \\"application/json\\"}"];
            feedParse [type="jsonparse" path="data,result,price"]
            feed -> feedParse

            usdc [type=http method=GET url="https://k8s.mainnet.asset.injective.network/asset-price/v1/prices?denoms=erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"];
            usdcParse [type="jsonparse" path="erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"]
            usdc -> usdcParse

            TRIAUSDCPrice [type="divide" input="$(feedParse)" divisor="$(usdcParse)" precision=6]
            TRIAUSDCPrice
          """
      - name: TTI_USDC.tpl
        content: |
          provider = "InjectiveLabs"
          ticker = "TTI/USDC"
          pullInterval = "5s"
          oracleType = "Provider"
          observationSource = """
            feed [type=http
                    method=GET
                    url="https://fast-api.mainnet.seda.xyz/execute?execProgramId=911f50231841ade5fe000b3b08ffaf2f2a4999e41dd75739390c6b6306ce1f54&execInputs=%7B%22proxyConfig%22%3A%7B%22proxyUrl%22%3A%22http%3A%2F%2Fpyth-pro-injective.proxy.mainnet.seda.xyz%2Fproxy%2F%22%2C%22proxyPublicKey%22%3A%22024f821c036d8459434ed22c7a9eae30306c98287dc3c2c523819bde735b50a7f9%22%7D%2C%22idOrSymbol%22%3A%221363%22%2C%22isId%22%3Atrue%7D&includeDebugInfo=true&encoding=utf8&injectLastResult=success"
                    headerMap="{\\"Authorization\\": \\"Bearer $SEDA_API_KEY\\", \\"Content-Type\\": \\"application/json\\"}"];
            feedParse1 [type="jsonparse" path="data,result"]
            feedParse2 [type="jsonparse" path="price"]
            feed -> feedParse1 -> feedParse2

            usdc [type=http method=GET url="https://k8s.mainnet.asset.injective.network/asset-price/v1/prices?denoms=erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"];
            usdcParse [type="jsonparse" path="erc20:0xa00C59fF5a080D2b954d0c75e46E22a0c371235a"]
            usdc -> usdcParse

            TTIUSDCPrice [type="divide" input="$(feedParse2)" divisor="$(usdcParse)" precision=6]
            TTIUSDCPrice
          """
